<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Habit Tracker</title>
</head>

<body>

    <header>
        <section class="right">
            <h1 class="main-title">Habit Tracker</h1>
            <p>Gabriel A.</p>
        </section>
    </header>

    <section class="habit-table">
        <div class="habit-table-title">
            <h2 class="table-title">Habit List</h2>
        </div>

        <div class="habit-table-content">
            <table class="habits-table">
                <tr>
                    <th>Habito</th>
                    <th>L</th>
                    <th>M</th>
                    <th>Mi</th>
                    <th>J</th>
                    <th>V</th>
                    <th>S</th>
                    <th>D</th>
                </tr>

                <!-- Cada checkbox tiene data-id único -->
                <tr>
                    <td class="habit">Ejercicio</td>
                    <td><input type="checkbox" data-id="ejercicio-0"></td>
                    <td><input type="checkbox" data-id="ejercicio-1"></td>
                    <td><input type="checkbox" data-id="ejercicio-2"></td>
                    <td><input type="checkbox" data-id="ejercicio-3"></td>
                    <td><input type="checkbox" data-id="ejercicio-4"></td>
                    <td><input type="checkbox" data-id="ejercicio-5"></td>
                    <td><input type="checkbox" data-id="ejercicio-6"></td>
                </tr>

                <tr>
                    <td class="habit">Lectura</td>
                    <td><input type="checkbox" data-id="lectura-0"></td>
                    <td><input type="checkbox" data-id="lectura-1"></td>
                    <td><input type="checkbox" data-id="lectura-2"></td>
                    <td><input type="checkbox" data-id="lectura-3"></td>
                    <td><input type="checkbox" data-id="lectura-4"></td>
                    <td><input type="checkbox" data-id="lectura-5"></td>
                    <td><input type="checkbox" data-id="lectura-6"></td>
                </tr>

                <tr>
                    <td class="habit">Tomar Agua</td>
                    <td><input type="checkbox" data-id="agua-0"></td>
                    <td><input type="checkbox" data-id="agua-1"></td>
                    <td><input type="checkbox" data-id="agua-2"></td>
                    <td><input type="checkbox" data-id="agua-3"></td>
                    <td><input type="checkbox" data-id="agua-4"></td>
                    <td><input type="checkbox" data-id="agua-5"></td>
                    <td><input type="checkbox" data-id="agua-6"></td>
                </tr>

                <tr>
                    <td class="habit">Meditar</td>
                    <td><input type="checkbox" data-id="meditar-0"></td>
                    <td><input type="checkbox" data-id="meditar-1"></td>
                    <td><input type="checkbox" data-id="meditar-2"></td>
                    <td><input type="checkbox" data-id="meditar-3"></td>
                    <td><input type="checkbox" data-id="meditar-4"></td>
                    <td><input type="checkbox" data-id="meditar-5"></td>
                    <td><input type="checkbox" data-id="meditar-6"></td>
                </tr>

            </table>
        </div>
    </section>

    <script src="script.js"></script>
</body>


</html>
